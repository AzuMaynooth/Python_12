<body class="w3-content" style="max-width:1200px">

<!-- Sidebar/menu -->
<nav class="w3-sidebar w3-bar-block w3-white w3-collapse w3-top" style="z-index:3;width:250px" id="mySidebar">
     <div class="w3-container w3-display-container w3-padding-16">
        <i onclick="w3_close()" class="fa fa-remove w3-hide-large w3-button w3-display-topright"></i>
        <h3 class="w3-wide"><img src="Logo.PNG" alt="Logo" style="width:100%"></h3>
    </div>
    <div class="w3-padding-64 w3-large w3-text-grey" style="font-weight:bold">
        <a href="main.html" class="w3-bar-item w3-button">Home</a>
        <a href="purchase.html" class="w3-bar-item w3-button">Purchase</a>
        <a href="sale.html" class="w3-bar-item w3-button">Sale</a>
        <a href="balance.html" class="w3-bar-item w3-button">Balance Change</a>
        <a href="history.html" class="w3-bar-item w3-button">History</a>

    </div>
</nav>

<!-- Top menu on small screens -->
<header class="w3-bar w3-top w3-hide-large w3-black w3-xlarge">
    <div class="w3-bar-item w3-padding-24 w3-wide">LOGO</div>
    <a href="javascript:void(0)" class="w3-bar-item w3-button w3-padding-24 w3-right" onclick="w3_open()"><i class="fa fa-bars"></i></a>
</header>

<!-- Overlay effect when opening sidebar on small screens -->
<div class="w3-overlay w3-hide-large" onclick="w3_close()" style="cursor:pointer" title="close side menu" id="myOverlay"></div>

<!-- !PAGE CONTENT! -->
<div class="w3-main" style="margin-left:250px">

    <!-- Push down content on small screens -->
    <div class="w3-hide-large" style="margin-top:83px"></div>

    <!-- Top header -->
    <header class="w3-container w3-xlarge">
        <p class="w3-left">History</p>
    </header>

    <div class="w3-container">
        <div id="historyList" class="w3-card-4 w3-padding-16">
            <!-- History content will be dynamically populated here -->
        </div>
    </div>

</div>

<script>
// Open and close sidebar
function w3_open() {
    document.getElementById("mySidebar").style.display = "block";
    document.getElementById("myOverlay").style.display = "block";
}

function w3_close() {
    document.getElementById("mySidebar").style.display = "none";
    document.getElementById("myOverlay").style.display = "none";
}

// Function to fetch and display history based on URL parameters
document.addEventListener('DOMContentLoaded', function() {
    var urlParams = new URLSearchParams(window.location.search);
    var from = urlParams.get('from');
    var to = urlParams.get('to');

    // Fetch and display history based on parameters
    fetchHistory(from, to);
});

function fetchHistory(from, to) {
    var historyList = document.getElementById('historyList');

    // Simulate fetching history data (replace with your actual data fetching logic)
    var historyData = [
        { id: 1, date: '2024-07-16', description: 'History entry 1' },
        { id: 2, date: '2024-07-15', description: 'History entry 2' },
        { id: 3, date: '2024-07-14', description: 'History entry 3' }
        // Add more entries as needed
    ];

    // Filter history based on from and to parameters
    if (from && to) {
        var filteredHistory = historyData.filter(function(entry) {
            return entry.date >= from && entry.date <= to;
        });
        displayHistory(filteredHistory);
    } else {
        displayHistory(historyData);
    }
}

function displayHistory(historyData) {
    var historyList = document.getElementById('historyList');
    historyList.innerHTML = ''; // Clear previous content

    historyData.forEach(function(entry) {
        var entryElement = document.createElement('div');
        entryElement.className = 'w3-container';
        entryElement.innerHTML = '<p><strong>Date:</strong> ' + entry.date + '</p>' +
                                 '<p><strong>Description:</strong> ' + entry.description + '</p>';
        historyList.appendChild(entryElement);
    });
}
</script>

</body>
</html>
